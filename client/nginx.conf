server {
    listen ${PORT};
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \\.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to the backend service.
    # resolver + variable => nginx resuelve en runtime, no al arrancar
    # (evita "host not found in upstream" con el DNS interno de Railway).
    location /api {
        resolver ${NGINX_RESOLVER} valid=10s;
        set $upstream http://back-end-app.railway.internal:5000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router - todas las rutas a index.html
    location / {
        try_files $uri $uri/ /index.html;
        error_page 404 =200 /index.html;
    }
}

